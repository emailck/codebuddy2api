services:
  codebuddy2api:
    build: .
    container_name: codebuddy2api
    ports:
      - "8787:8787"
    environment:
      CB2PAI_ADMIN_TOKEN: "change-this-admin-token"
      CB2PAI_MASTER_KEY: "change-this-master-key-at-least-32-chars"
      CB2PAI_HOST: "0.0.0.0"
      CB2PAI_PORT: "8787"
      CB2PAI_DB_PATH: "/app/data/codebuddy2api.db"
      CB2PAI_DEFAULT_ENDPOINT: "https://copilot.tencent.com"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
